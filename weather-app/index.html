<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App España - Clima en Tiempo Real</title>
    <meta name="description" content="Aplicación web para ver el clima de las principales ciudades de España con mapa interactivo.">
    <meta name="keywords" content="clima, tiempo, españa, ciudades, mapa, weather">
    <meta name="author" content="Carlos Expósito">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-content">
            <div class="header-left">
                <div class="app-icon">
                    <i class="fas fa-cloud-sun"></i>
                </div>
                <div class="header-text">
                    <h1>Weather App España</h1>
                    <p>Clima en tiempo real</p>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-toggle" id="toggleView" title="Alternar vista">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Search Section -->
    <section class="search-section">
        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="citySearch" placeholder="Buscar ciudad...">
                <button id="searchBtn" class="search-btn">
                    <i class="fas fa-search"></i>
                    Buscar
                </button>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Map Container -->
        <div class="map-container" id="mapContainer">
            <div id="map"></div>
            <div class="map-info">
                <p><i class="fas fa-map-marker-alt"></i> Click en un pin para ver el clima</p>
            </div>
        </div>

        <!-- Weather Cards -->
        <div class="weather-cards-container" id="weatherCards">
            <div class="cards-grid" id="cardsGrid">
                <!-- Weather cards will be dynamically inserted here -->
            </div>
        </div>
    </main>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-cloud-sun fa-spin"></i>
        </div>
        <p>Cargando datos climáticos...</p>
    </div>

    <!-- Footer -->
    <footer class="app-footer">
        <p>&copy; 2025 Weather App España | Desarrollado por <a href="https://firstondie.github.io" target="_blank">Carlos Expósito</a></p>
        <p class="data-source">Datos proporcionados por <a href="https://open-meteo.com" target="_blank">Open-Meteo</a></p>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Custom Scripts -->
    <script src="app.js"></script>
</body>
</html>
